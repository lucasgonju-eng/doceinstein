name: Deploy Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy static app to Hostinger via FTP/SFTP
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_PROTOCOL }}
        run: |
          test -n "$HOSTINGER_HOST" || (echo "Missing HOSTINGER_HOST" && exit 1)
          test -n "$HOSTINGER_PORT" || (echo "Missing HOSTINGER_PORT" && exit 1)
          test -n "$HOSTINGER_USER" || (echo "Missing HOSTINGER_USER" && exit 1)
          test -n "$HOSTINGER_PASSWORD" || (echo "Missing HOSTINGER_PASSWORD" && exit 1)
          test -n "$HOSTINGER_REMOTE_PATH" || (echo "Missing HOSTINGER_REMOTE_PATH" && exit 1)
          set -x
          PROTOCOL="${HOSTINGER_PROTOCOL:-ftp}"
          REMOTE_URL="${PROTOCOL}://$HOSTINGER_HOST:$HOSTINGER_PORT"
          if [ "$PROTOCOL" = "ftp" ]; then
            TLS_COMMANDS='set ftp:ssl-allow no'
          elif [ "$PROTOCOL" = "ftps" ]; then
            # FTPS explícito (AUTH TLS): usa endpoint ftp:// com TLS forçado.
            REMOTE_URL="ftp://$HOSTINGER_HOST:$HOSTINGER_PORT"
            TLS_COMMANDS='set ftp:ssl-force true; set ftp:ssl-protect-data true'
          else
            TLS_COMMANDS='set sftp:auto-confirm yes'
          fi
          lftp -u "$HOSTINGER_USER","$HOSTINGER_PASSWORD" "$REMOTE_URL" <<EOF
          set cmd:fail-exit yes
          set net:timeout 20
          set net:max-retries 1
          debug 3
          set ssl:verify-certificate no
          ${TLS_COMMANDS}
          mirror -R --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob .gitignore \
            --exclude-glob supabase/ \
            --exclude-glob *.sql \
            --exclude-glob README.txt \
            ./ "$HOSTINGER_REMOTE_PATH"
          bye
          EOF

